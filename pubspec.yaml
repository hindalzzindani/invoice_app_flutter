name: invoice_app_flutter
description: "تطبيق احترافي لإدارة الفواتير مع حاسبة مبيعات وقواعد بيانات محلية وسحابية."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_localization: ^0.3.3
  material_design_icons_flutter: ^7.0.7296

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Database
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_database: ^10.3.0
  firebase_storage: ^11.5.0
  cloud_firestore: ^4.14.0

  # Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.0
  pdf: ^3.10.8
  printing: ^5.11.1
  permission_handler: ^11.4.0

  # HTTP
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.2
  device_info_plus: ^10.0.0

  # Date/Time
  table_calendar: ^3.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/app_icon.png

  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Regular.ttf
        - asset: assets/fonts/Almarai-Bold.ttf
          weight: 700
        - asset: assets/fonts/Almarai-Light.ttf
          weight: 300
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
